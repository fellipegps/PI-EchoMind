# alembic.ini – Configuração do Alembic para EchoMind
# Documentação: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Caminho para o diretório de migrations
script_location = alembic

# Formato dos nomes de arquivo de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# A URL do banco é lida da variável de ambiente DATABASE_URL (veja env.py)
# Não coloque credenciais aqui — use o .env
sqlalchemy.url = postgresql://echomind:echomind@localhost:5432/echomind

# Logging do Alembic
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
