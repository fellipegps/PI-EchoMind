# ─── nginx/nginx.conf ─────────────────────────────────────────────────────────
# Reverse proxy para o EchoMind em produção.
#
# Responsabilidades:
#   • Termina HTTPS (TLS) com certificado Let's Encrypt (via Certbot)
#   • Redireciona HTTP → HTTPS
#   • Faz proxy das requisições para o container FastAPI
#   • Habilita GZIP para respostas JSON
#   • Configura timeouts longos para streaming do /chat
#   • Serve o frontend Next.js (se no mesmo servidor)
#
# IMPORTANTE: Substitua <SEU_DOMINIO> pelo domínio real em todas as ocorrências.
# ──────────────────────────────────────────────────────────────────────────────

# Ajuste conforme número de núcleos da VM
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── GZIP ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting (proteção básica) ──────────────────────────────────────
    # Limite: 30 requisições/minuto por IP no /chat
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/m;

    # ── Upstream (FastAPI) ────────────────────────────────────────────────────
    upstream echomind_api {
        server api:8000;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  HTTP → HTTPS Redirect
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name <SEU_DOMINIO> www.<SEU_DOMINIO>;

        # Permite verificação do Certbot (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    #  HTTPS — API EchoMind
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name <SEU_DOMINIO> www.<SEU_DOMINIO>;

        # ── Certificados TLS (gerados pelo Certbot) ───────────────────────
        ssl_certificate     /etc/letsencrypt/live/<SEU_DOMINIO>/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/<SEU_DOMINIO>/privkey.pem;

        # Configurações TLS seguras (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # HSTS — força HTTPS por 1 ano
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Headers de segurança
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # ── Tamanho máximo do body (perguntas longas) ─────────────────────
        client_max_body_size 1m;

        # ── /chat — Streaming com timeouts longos ─────────────────────────
        location /chat {
            limit_req zone=chat_limit burst=5 nodelay;

            proxy_pass         http://echomind_api;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # ⚠️ CRÍTICO para streaming funcionar:
            # Desabilita buffer para que tokens cheguem ao cliente em tempo real
            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    300s;  # LLMs locais podem demorar
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;

            # SSE / chunked transfer
            add_header X-Accel-Buffering no;
            add_header Cache-Control     no-cache;
        }

        # ── API geral ─────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://echomind_api/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }

        # ── Rotas diretas da API (sem prefixo /api/) ──────────────────────
        location ~ ^/(faqs|events|config|unanswered|dashboard|health|metrics|docs|openapi) {
            proxy_pass         http://echomind_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }

        # ── Frontend Next.js (opcional — se servido no mesmo servidor) ────
        # Descomente se o front estiver rodando em porta 3000 localmente
        # location / {
        #     proxy_pass         http://localhost:3000;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade    $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host       $host;
        # }

        # ── Fallback para arquivos estáticos ──────────────────────────────
        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
